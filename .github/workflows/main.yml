name: Ultimate Auto VPN System

on:
  schedule:
    # প্রতি ১ ঘণ্টা পর পর অটোমেটিক রান হবে (আপনি চাইলে সময় পরিবর্তন করতে পারেন)
    - cron: '0 * * * *'
  workflow_dispatch: # ম্যানুয়ালি ক্লিক করে রান করার অপশন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ১. রেপোজিটরি চেকআউট করা
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # পুরো গিট হিস্ট্রি নেওয়ার জন্য যাতে মার্জ এরর না আসে

      # ২. পাইথন এনভায়রনমেন্ট সেটআপ করা
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # ৩. আপনার তৈরি করা মেগা স্ক্র্যাপার রান করা
      - name: Run Premium Scraper and Ping Tester
        run: |
          python main.py

      # ৪. কনফ্লিক্ট বা জটলা ছাড়াই জোরপূর্বক গিটহাবে পুশ করা (সমাধান ব্লক)
      - name: Force Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # ফাইলটিকে গিটের ট্র্যাকে নিয়ে আসা
          git add subscription.txt
          
          # ফাইল আসলেই পরিবর্তন হয়েছে কিনা তা চেক করে কমিট ও পুশ প্রসেস শুরু করা
          if ! git diff --staged --quiet; then
            git commit -m "Professional Ultimate VPN Update [Multi-Tasking Engine]"
            
            # ক্লাউডের যেকোনো চেঞ্জের সাথে লোকাল ফাইলকে জোরপূর্বক মার্জ করা (কনফ্লিক্ট এড়িয়ে)
            git fetch origin main
            git merge origin/main --allow-unrelated-histories -X theirs --no-edit
            
            # কোনো বাধা ছাড়াই ফাইলটি গিটহাবে লাইভ করে দেওয়া
            git push origin main --force
            echo "✅ subscription.txt সফলভাবে পুশ এবং আপডেট করা হয়েছে!"
          else
            echo "🚀 ফাইলে কোনো নতুন পরিবর্তন নেই, পুশ করার প্রয়োজন হয়নি।"
          fi
