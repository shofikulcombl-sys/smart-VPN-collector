name: Smart Auto VPN Update

on:
  schedule:
    - cron: '*/15 * * * *' # প্রতি ১৫ মিনিট পর পর নিজে নিজেই ব্যাকএন্ডে রান হবে
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Run Premium Scraper and Ping Tester
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add subscription.txt
        git commit -m "Ultra-Deep nodes updated every 15 mins" || exit 0
        git push
